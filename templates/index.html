<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pi Scanner</title>
<style>
body { font-family: system-ui, sans-serif; margin: 2rem; }
h2 { margin-top: 0; }
.row { display: flex; gap: 1rem; flex-wrap: wrap; }
button { font-size: 1.3rem; padding: 1rem 1.2rem; border-radius: 12px; border: 1px solid #ccc; transition: transform .05s ease, box-shadow .2s ease, background-color .2s; }
button:active { transform: translateY(1px); }
button.loading { background-color: #e0e0e0; color: #666; box-shadow: inset 0 2px 6px rgba(0,0,0,.15); pointer-events: none; }
button.success { background-color: #d8f5d0; border-color: #8bd17a; }
button.error { background-color: #ffd6d6; border-color: #ff9b9b; }
#recent a { display:block; margin: .2rem 0; }
input[type=text]{ font-size:1rem; padding:.5rem; width: 22rem; }
small{ color:#666; }
</style>
</head>
<body>
<h2>📄 Pi Scanner</h2>
<div class="row">
<button onclick="doScan(this)">Scan</button>
<button onclick="toggleLED(this)">LED Toggle</button>
</div>
<div style="margin: 1rem 0;">
<label>Zoom Level: <span id="zoomValue">0.3</span>x</label><br/>
<input type="range" id="zoomSlider" min="0.2" max="2.0" step="0.1" value="0.3" 
       oninput="document.getElementById('zoomValue').textContent = this.value" 
       style="width: 300px; margin-top: 0.5rem;" />
<small style="display: block; color: #666; margin-top: 0.3rem;">
  Lower = zoomed out (more visible), Higher = zoomed in. Also move camera further from paper.
</small>
</div>
<p>
Work folder: <span id="workdir"></span>
<br/><small>Tip: Add this page to your phone/iPad home screen.</small>
</p>
<div style="margin:.5rem 0;">
<input id="newdir" type="text" placeholder="/home/pi/Scans" />
<button id="setDirBtn" onclick="setDir(this)">Choose Folder…</button>
</div>
<h3>Recent files</h3>
<div id="recent"></div>


<script>
const TOKEN = "{{ token or '' }}";
function authHeaders(){
const h = {}; if (TOKEN) h["X-Auth"] = TOKEN; return h;
}
function setLoading(btn, isLoading){
  if(!btn) return;
  if(isLoading){ btn.classList.remove('success','error'); btn.classList.add('loading'); }
  else { btn.classList.remove('loading'); }
}
function flash(btn, kind){ if(!btn) return; btn.classList.remove('loading'); btn.classList.add(kind); setTimeout(()=>btn.classList.remove(kind), 1200); }
async function refresh(){
const r = await fetch('/api/status', {headers: authHeaders()});
const j = await r.json();
if(!j.ok){ alert(j.error||'status error'); return; }
document.getElementById('workdir').textContent = j.workdir;
const div = document.getElementById('recent');
div.innerHTML = '';
j.recent.forEach(f=>{
const a = document.createElement('a');
a.href = '/downloads/' + encodeURIComponent(f);
a.textContent = f;
div.appendChild(a);
});
}
async function doScan(btn){
try{
setLoading(btn, true);
const zoom = document.getElementById('zoomSlider').value;
const r = await fetch('/api/scan', {
    method:'POST', 
    headers: {...authHeaders(), 'Content-Type': 'application/json'},
    body: JSON.stringify({zoom: parseFloat(zoom)})
});
const j = await r.json();
if(!j.ok){ flash(btn,'error'); alert(j.error||'scan error'); return; }
flash(btn,'success');
alert('Saved: ' + j.saved.join(', '));
refresh();
} finally { setLoading(btn, false); }
}
async function toggleLED(btn){
try{
setLoading(btn, true);
const r = await fetch('/api/led/toggle', {method:'POST', headers: authHeaders()});
const j = await r.json();
if(!j.ok){ flash(btn,'error'); alert(j.error||'led error'); return; }
flash(btn,'success');
} finally { setLoading(btn, false); }
}
async function setDir(btn){
try{
setLoading(btn, true);
const path = document.getElementById('newdir').value.trim();
if(!path){ flash(btn,'error'); return; }
const r = await fetch('/api/set_workdir', {method:'POST', headers: { 'Content-Type': 'application/json', ...authHeaders()}, body: JSON.stringify({path})});
const j = await r.json();
if(!j.ok){ flash(btn,'error'); alert(j.error||'set dir error'); return; }
flash(btn,'success');
refresh();
} finally { setLoading(btn, false); }
}
refresh();
</script>
</body>
</html>
